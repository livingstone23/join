name: Backend CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4

    - name: ⚙️ Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        # AQUÍ ESTÁ LA MAGIA PARA .NET 10
        dotnet-version: '10.0.x' 

    - name: 📦 Restore dependencies
      run: dotnet restore

    - name: 🔨 Build
      run: dotnet build --no-restore --configuration Release

    - name: 🧪 Run Unit Tests & Enforce Coverage
      # Scope explícito al proyecto de unitarias: el gate del 90% aplica
      # exclusivamente a JOIN.Application.UnitTest. Si se omitiera el project
      # path, `dotnet test` correría también IntegrationTests e inflaría la
      # métrica con cobertura de Controllers, Behaviors, EF Core, etc.
      run: >
        dotnet test tests/UnitTests/JOIN.Application.UnitTest/JOIN.Application.UnitTest.csproj
        --no-build --configuration Release --verbosity normal
        /p:CollectCoverage=true
        /p:CoverletOutputFormat=cobertura
        /p:Threshold=90
        /p:ThresholdType=line

    - name: 🐳 Run Integration Tests (Testcontainers)
      # Sin flags de Coverlet/Threshold: las pruebas de integración no entran
      # en el gate de cobertura del 90% (separación deliberada por spec).
      # El runner ubuntu-latest trae Docker preinstalado.
      run: dotnet test tests/IntegrationTests/JOIN.IntegrationTests.csproj --no-build --configuration Release --verbosity normal

    # --- LOS SIGUIENTES PASOS GENERAN EL COMENTARIO VISUAL EN EL PR ---
    - name: 📊 Generate Code Coverage Report
      uses: irongut/CodeCoverageSummary@v1.3.0
      if: github.event_name == 'pull_request' # Solo se activa en Pull Requests
      with:
        filename: '**/coverage.cobertura.xml'
        badge: true
        format: markdown
        hide_branch_rate: false
        hide_complexity: true
        indicators: true
        output: both

    - name: 📝 Add Coverage PR Comment
      uses: marocchino/sticky-pull-request-comment@v2
      if: github.event_name == 'pull_request'
      with:
        recreate: true
        path: code-coverage-results.md